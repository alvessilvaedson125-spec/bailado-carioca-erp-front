<h2>Alunos</h2>

<button id="newStudentBtn" class="btn-primary">
+ Novo aluno
</button>

<div class="card search-card">

<div class="search-box">

<span class="search-icon">🔍</span>

<input 
type="text"
id="searchStudents"
placeholder="Pesquisar aluno..."
>

</div>

</div>

<div class="card">

<table id="studentsTable">

<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th style="width:120px;">Ações</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div id="studentModal" class="modal hidden">
  <div class="modal-content">

    <h3>Novo aluno</h3>

    <input type="hidden" id="editStudentId">

    <input type="text" id="editStudentName" placeholder="Nome">
    <input type="email" id="editStudentEmail" placeholder="Email">
    <input type="text" id="editStudentPhone" placeholder="Telefone">

    <div style="margin-top:10px;">
      <button id="cancelStudentBtn">Cancelar</button>
      <button id="saveStudentBtn">Salvar</button>
    </div>

  </div>
</div>
