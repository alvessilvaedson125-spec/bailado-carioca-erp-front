<div class="page-header">
  <div>
    <h1>Alunos</h1>
    <p class="page-subtitle">Gerencie os alunos da escola</p>
  </div>
  <button id="newStudentBtn" class="btn-primary">+ Novo aluno</button>
</div>

<!-- CONTADOR -->
<div class="students-stats">
  <span id="studentsCount" class="students-count">Carregando...</span>
</div>

<div class="card search-card">
  <div class="search-box-modern">
    <span class="search-icon">🔍</span>
    <input
      type="text"
      id="searchStudents"
      placeholder="Buscar por nome ou email..."
    >
  </div>
</div>

<div class="card">
  <table id="studentsTable">
    <thead>
      <tr>
        <th>Aluno</th>
        <th>Email</th>
        <th>Telefone</th>
        <th>Status</th>
        <th style="width:180px;">Ações</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- MODAL EDITAR/NOVO ALUNO -->
<div id="studentModal" class="modal hidden">
  <div class="modal-content modal-lg">

    <div class="modal-header">
      <h2 id="modalTitle">Novo aluno</h2>
    </div>

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="editStudentName" class="form-control">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editStudentEmail" class="form-control">
        </div>
        <div class="form-group full-width">
          <label>Telefone</label>
          <input type="text" id="editStudentPhone" class="form-control">
        </div>
      </div>
      <input type="hidden" id="editStudentId">
    </div>

    <div class="modal-footer">
      <button id="cancelStudentBtn" class="btn-secondary">Cancelar</button>
      <button id="saveStudentBtn" class="btn-primary">Salvar aluno</button>
    </div>

  </div>
</div>

<!-- MODAL PERFIL DO ALUNO -->
<div id="studentProfileModal" class="modal hidden">
  <div class="modal-content" style="max-width:520px;">

    <div class="profile-header">
      <div class="profile-avatar-lg" id="profileAvatar">?</div>
      <div class="profile-info">
        <h3 id="profileName">—</h3>
        <div class="profile-contact">
          <span>✉️ <span id="profileEmail">—</span></span>
          <span>📱 <span id="profilePhone">—</span></span>
        </div>
      </div>
    </div>

    <div class="profile-section-title">Matrículas</div>
    <div id="profileEnrollments"></div>

    <div class="modal-actions" style="margin-top:20px;">
      <button id="profileCloseBtn" class="btn-secondary">Fechar</button>
      <button id="profileNewEnrollBtn" class="btn-primary">+ Matricular em outra turma</button>
    </div>

  </div>
</div>
