<h2>Alunos</h2>

<button id="newStudentBtn" class="btn-primary btn-lg">
  + Novo aluno
</button>

<div class="card search-card">

<div class="search-box-modern">
  <span>🔍</span>
  <input 
    type="text"
    id="searchStudents"
    placeholder="Buscar alunos..."
  >
</div>

</div>

<div class="card">

<table id="studentsTable">

<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th style="width:120px;">Ações</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div id="studentModal" class="modal hidden">
  <div class="modal-content modal-lg">

    <div class="modal-header">
      <h2 id="modalTitle">Novo aluno</h2>
    </div>

    <div class="modal-body">

      <div class="form-grid">

        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="editStudentName" class="form-control">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="editStudentEmail" class="form-control">
        </div>

        <div class="form-group full-width">
          <label>Telefone</label>
          <input type="text" id="editStudentPhone" class="form-control">
        </div>

      </div>

      <input type="hidden" id="editStudentId">

    </div>

    <div class="modal-footer">
      <button id="cancelStudentBtn" class="btn-secondary">
        Cancelar
      </button>
      <button id="saveStudentBtn" class="btn-primary">
        Salvar aluno
      </button>
    </div>

  </div>
</div>
