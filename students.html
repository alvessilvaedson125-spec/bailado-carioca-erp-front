<h2>Alunos</h2>

<button id="newStudentBtn" class="btn-primary">
+ Novo aluno
</button>

<div class="card search-card">

<div class="search-box">

<span class="search-icon">🔍</span>

<input 
type="text"
id="searchStudents"
placeholder="Pesquisar aluno..."
>

</div>

</div>

<div class="card">

<table id="studentsTable">

<thead>
<tr>
<th>Nome</th>
<th>Email</th>
<th style="width:120px;">Ações</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<div id="studentModal" class="modal hidden">
  <div class="modal-content">

    <h3 style="margin-bottom:20px;">Novo aluno</h3>

    <div class="form-group">
      <label>Nome</label>
      <input type="text" id="editStudentName" class="form-control">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="editStudentEmail" class="form-control">
    </div>

    <div class="form-group">
      <label>Telefone</label>
      <input type="text" id="editStudentPhone" class="form-control">
    </div>

    <input type="hidden" id="editStudentId">

    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <button id="cancelStudentBtn" style="background:#e5e7eb; color:#111827;">
        Cancelar
      </button>
      <button id="saveStudentBtn">
        Salvar
      </button>
    </div>

  </div>
</div>
