<h2>Caixa</h2>

<div class="cash-kpis">

  <div class="card kpi">
    <span>Saldo atual</span>
    <strong id="cash-balance">R$ 0</strong>
  </div>

  <div class="card kpi">
    <span>Entradas</span>
    <strong id="cash-in">R$ 0</strong>
  </div>

  <div class="card kpi">
    <span>Saídas</span>
    <strong id="cash-out">R$ 0</strong>
  </div>

</div>

<div class="card cash-form">
  <h3>Nova movimentação</h3>

 <div class="form-row">

  <div class="form-group">
    <label>Data</label>
    <input type="date" class="form-control">
  </div>

  <div class="form-group">
    <label>Tipo</label>
    <select class="form-control"></select>
  </div>

  <div class="form-group">
    <label>Valor</label>
    <input type="number" class="form-control">
  </div>

  <div class="form-group descricao">
    <label>Descrição</label>
    <input type="text" class="form-control">
  </div>

  <!-- BOTÕES AGORA FAZEM PARTE DO GRID -->
  <div class="form-buttons">
    <button class="btn-primary">Salvar</button>
    <button class="btn-secondary">Limpar</button>
  </div>

</div>

<div id="cash-error" class="form-error"></div>

</div>


<div class="card">
  <h3>Movimentações</h3>

 <div class="filters-bar">

  <select id="filter-type">
    <option value="">Todos</option>
    <option value="in">Entrada</option>
    <option value="out">Saída</option>
  </select>

  <input
    type="text"
    id="filter-text"
    placeholder="Buscar descrição..."
  >

  <button id="clear-filters" class="btn-secondary">
    Limpar
  </button>

</div>

  </div>
  <table class="cash-table">
    <thead>
      <tr>
        <th>Data</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Descrição</th>
       <th>Ações</th>
      </tr>
    </thead>

    <tbody id="cash-body"></tbody>
  </table>
</div>
