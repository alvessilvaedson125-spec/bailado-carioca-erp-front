<h2>Caixa</h2>

<div class="cash-kpis">

  <div class="card kpi">
    <span>Saldo atual</span>
    <strong id="cash-balance">R$ 0</strong>
  </div>

  <div class="card kpi">
    <span>Entradas</span>
    <strong id="cash-in">R$ 0</strong>
  </div>

  <div class="card kpi">
    <span>Saídas</span>
    <strong id="cash-out">R$ 0</strong>
  </div>

</div>

<div class="card">
  <h3>Nova movimentação</h3>

 <div class="form-row">
  <label>Data</label>
  <input type="date" id="cash-date">

  <label>Tipo</label>
  <select id="cash-type">
    <option value="in">Entrada</option>
    <option value="out">Saída</option>
  </select>

  <label>Valor</label>
  <input type="number" id="cash-amount">

  <label>Descrição</label>
  <input type="text" id="cash-description">
</div>

<div class="form-actions">
  <button class="btn-primary" onclick="CashModule.createEntry()">
    Salvar
  </button>

  <button class="btn-secondary" onclick="CashModule.clearForm()">
    Limpar
  </button>
</div>

<div id="cash-error" class="form-error"></div>

</div>


<div class="card">
  <h3>Movimentações</h3>

 <div class="filters-bar">

  <select id="filter-type">
    <option value="">Todos</option>
    <option value="in">Entrada</option>
    <option value="out">Saída</option>
  </select>

  <input
    type="text"
    id="filter-text"
    placeholder="Buscar descrição..."
  >

  <button id="clear-filters" class="btn-secondary">
    Limpar
  </button>

</div>

  </div>
  <table class="cash-table">
    <thead>
      <tr>
        <th>Data</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Descrição</th>
       <th>Ações</th>
      </tr>
    </thead>

    <tbody id="cash-body"></tbody>
  </table>
</div>
