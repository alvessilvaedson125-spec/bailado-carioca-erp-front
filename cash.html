<h2>Caixa</h2>

<h3 id="cash-balance" class="cash-balance">
  Saldo atual: R$ 0
</h3>

<div id="cash-summary" class="cash-summary">
  <div id="cash-in" class="cash-in"></div>
  <div id="cash-out" class="cash-out"></div>
</div>

<div class="card">
  <h3>Nova movimentação</h3>

  <div class="form-row">
    <label>Data</label>
    <input type="date" id="cash-date">

    <label>Tipo</label>
    <select id="cash-type">
      <option value="in">Entrada</option>
      <option value="out">Saída</option>
    </select>

    <label>Valor</label>
    <input type="number" id="cash-amount">

    <label>Descrição</label>
    <input type="text" id="cash-description">

    <button onclick="CashModule.createEntry()">
      Salvar
    </button>

    <div id="cash-error" style="color: red; margin-top: 8px;"></div>
  </div>
</div>

<br>

<div class="card">
  <h3>Movimentações</h3>

  <table class="cash-table">
    <thead>
      <tr>
        <th>Data</th>
        <th>Tipo</th>
        <th>Valor</th>
        <th>Descrição</th>
      </tr>
    </thead>

    <tbody id="cash-body"></tbody>
  </table>
</div>
