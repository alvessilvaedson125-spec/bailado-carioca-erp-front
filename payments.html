<div class="page">

  <!-- HEADER -->
  <div class="payments-header">
    <div>
      <h1>Pagamentos</h1>
      <p>Gestão de mensalidades e fluxo financeiro</p>
    </div>
  </div>

  <!-- GERAR + FILTRAR -->
  <div class="payments-filters">

    <div class="card">
      <h3>Gerar mensalidades</h3>

      <div class="form-row">
        <label>Mês</label>
        <input type="number" id="competence-month" min="1" max="12">

        <label>Ano</label>
        <input type="number" id="competence-year">

        <button onclick="PaymentsModule.generatePayments()">Gerar</button>
      </div>
    </div>

    <div class="card">
      <h3>Filtrar pagamentos</h3>

      <div class="form-row">
        <label>Mês</label>
        <input type="number" id="filter-month" min="1" max="12">

        <label>Ano</label>
        <input type="number" id="filter-year">

        <button onclick="PaymentsModule.loadPayments()">Filtrar</button>
      </div>
    </div>

  </div>

  <!-- RESUMO -->
  <div class="payments-summary">

    <div>
      <span>Total esperado</span>
      <strong id="total-expected">R$ 0</strong>
    </div>

    <div>
      <span>Recebido</span>
      <strong id="total-paid">R$ 0</strong>
    </div>

    <div>
      <span>Pendente</span>
      <strong id="total-pending">R$ 0</strong>
    </div>

    <div>
      <span>Vencido</span>
      <strong id="total-overdue">R$ 0</strong>
    </div>

  </div>

  <!-- CAIXA -->
  <div class="card">
    <h3>Caixa</h3>

    <div class="cash-values">
      <div>
        <span>Hoje</span>
        <strong id="cash-today">R$ 0</strong>
      </div>

      <div>
        <span>Mês</span>
        <strong id="cash-month">R$ 0</strong>
      </div>
    </div>
  </div>

  <!-- TABELA -->
  <div class="card">

    <h3>Lista de pagamentos</h3>

    <table id="payments-table">
      <thead>
        <tr>
          <th>Aluno</th>
          <th>Turma</th>
          <th>Valor</th>
          <th>Competência</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="payments-body"></tbody>
    </table>

  </div>

</div>
