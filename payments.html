<div class="page"></div>


<div class="page-header">

  <div class="page-section"></div>
  <div>
    <h1>Pagamentos</h1>
    <p>Gestão de mensalidades e fluxo financeiro</p>
  </div>
</div>

<!-- ========================= -->
<!-- GERADOR DE MENSALIDADES -->
<!-- ========================= -->

<div class="card">

<div class="card-title">Gerar mensalidades</div>

<div class="form-row">

<label>Mês</label>
<input type="number" id="competence-month" min="1" max="12">

<label>Ano</label>
<input type="number" id="competence-year">

<button onclick="PaymentsModule.generatePayments()"></button>
</div>

</div>



<!-- ========================= -->
<!-- FILTROS -->
<!-- ========================= -->

<div class="card">

<h3>Filtrar pagamentos</h3>

<div class="form-row">

<label>Mês</label>
<input type="number" id="filter-month" min="1" max="12">

<label>Ano</label>
<input type="number" id="filter-year">

<button onclick="PaymentsModule.loadPayments()"></button>
</div>


</div>



<!-- ========================= -->
<!-- DASHBOARD FINANCEIRO -->
<!-- ========================= -->

<div class="card">

  <div class="summary-grid">

    <div class="summary-item">
      <span>Total esperado</span>
      <strong id="total-expected">R$ 0</strong>
    </div>

    <div class="summary-item">
      <span>Recebido</span>
      <strong id="total-paid">R$ 0</strong>
    </div>

    <div class="summary-item">
      <span>Pendente</span>
      <strong id="total-pending">R$ 0</strong>
    </div>

    <div class="summary-item">
      <span>Vencido</span>
      <strong id="total-overdue">R$ 0</strong>
    </div>

  </div>

</div>

<!-- ========================= -->
<!-- CAIXA (FLUXO) -->
<!-- ========================= -->

<div class="card">

  <h3>Caixa</h3>

  <div class="summary-grid">

    <div class="summary-item">
      <span>Hoje</span>
      <strong id="cash-today">R$ 0</strong>
    </div>

    <div class="summary-item">
      <span>Mês</span>
      <strong id="cash-month">R$ 0</strong>
    </div>

  </div>

</div>


<!-- ========================= -->
<!-- LISTA DE PAGAMENTOS -->
<!-- ========================= -->

<div class="card">

<h3>Lista de pagamentos</h3>

<table id="payments-table">

<thead>

<tr>
<th>Aluno</th>
<th>Turma</th>
<th>Valor</th>
<th>Competência</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="payments-body"></tbody>



</table>

</div>

</div>

</div>
