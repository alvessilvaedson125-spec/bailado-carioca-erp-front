


<h2>Pagamentos</h2>

<!-- ========================= -->
<!-- GERADOR DE MENSALIDADES -->
<!-- ========================= -->

<div class="card">

<h3>Gerar mensalidades</h3>

<div class="form-row">

<label>Mês</label>
<input type="number" id="competence-month" min="1" max="12">

<label>Ano</label>
<input type="number" id="competence-year">

<button onclick="PaymentsModule.generatePayments()"></button>
</div>

</div>

<br>

<!-- ========================= -->
<!-- FILTROS -->
<!-- ========================= -->

<div class="card">

<h3>Filtrar pagamentos</h3>

<div class="form-row">

<label>Mês</label>
<input type="number" id="filter-month" min="1" max="12">

<label>Ano</label>
<input type="number" id="filter-year">

<button onclick="PaymentsModule.loadPayments()"></button>
</div>


</div>

<br>

<!-- ========================= -->
<!-- DASHBOARD FINANCEIRO -->
<!-- ========================= -->

<div class="card" style="display:flex; gap:20px; margin-bottom:20px;">

  <div>
    <strong>Total esperado</strong>
    <div id="total-expected">R$ 0</div>
  </div>

  <div>
    <strong>Recebido</strong>
    <div id="total-paid">R$ 0</div>
  </div>

  <div>
    <strong>Pendente</strong>
    <div id="total-pending">R$ 0</div>
  </div>

  <div>
    <strong>Vencido</strong>
    <div id="total-overdue">R$ 0</div>
  </div>

</div>

<!-- ========================= -->
<!-- CAIXA (FLUXO) -->
<!-- ========================= -->

<div class="card" style="margin-bottom:20px;">

<h3>Caixa</h3>

<div style="display:flex; gap:20px;">

  <div>
    <strong>Hoje</strong>
    <div id="cash-today">R$ 0</div>
  </div>

  <div>
    <strong>Mês</strong>
    <div id="cash-month">R$ 0</div>
  </div>

</div>

</div>


<!-- ========================= -->
<!-- LISTA DE PAGAMENTOS -->
<!-- ========================= -->

<div class="card">

<h3>Lista de pagamentos</h3>

<table id="payments-table">

<thead>

<tr>
<th>Aluno</th>
<th>Turma</th>
<th>Valor</th>
<th>Competência</th>
<th>Status</th>
<th>Ações</th>
</tr>

</thead>

<tbody id="payments-body"></tbody>



</table>

</div>

<br>

<!-- ========================= -->
<!-- RESPOSTA DA API -->
<!-- ========================= -->

<div class="card">

<h3>Resposta da API</h3>

<pre id="output"></pre>

</div>
