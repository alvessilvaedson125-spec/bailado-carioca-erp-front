<div class="page">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h1>Pagamentos</h1>
      <p class="page-subtitle">Gestão de mensalidades e fluxo financeiro</p>
    </div>
  </div>

  <!-- GERAR + FILTRAR -->
  <div class="payments-filters">

    <div class="payments-filter-card">
      <h3>Gerar mensalidades</h3>
      <div class="payments-filter-row">
        <div class="form-group">
          <label>Mês</label>
          <input type="number" id="competence-month" min="1" max="12" placeholder="Ex: 3">
        </div>
        <div class="form-group">
          <label>Ano</label>
          <input type="number" id="competence-year" placeholder="Ex: 2026">
        </div>
        <button class="btn-primary" onclick="PaymentsModule.generatePayments()">Gerar</button>
      </div>
    </div>

    <div class="payments-filter-card">
      <h3>Filtrar pagamentos</h3>
      <div class="payments-filter-row">
        <div class="form-group">
          <label>Mês</label>
          <input type="number" id="filter-month" min="1" max="12" placeholder="Ex: 3">
        </div>
        <div class="form-group">
          <label>Ano</label>
          <input type="number" id="filter-year" placeholder="Ex: 2026">
        </div>
        <button class="btn-primary" onclick="PaymentsModule.loadPayments()">Filtrar</button>
      </div>
    </div>

  </div>

  <!-- KPIs -->
  <div class="payments-kpis">

    <div class="payments-kpi-card">
      <span class="payments-kpi-label">Total esperado</span>
      <strong class="payments-kpi-value" id="total-expected">—</strong>
    </div>

    <div class="payments-kpi-card green">
      <span class="payments-kpi-label">Recebido</span>
      <strong class="payments-kpi-value" id="total-paid">—</strong>
    </div>

    <div class="payments-kpi-card orange">
      <span class="payments-kpi-label">Pendente</span>
      <strong class="payments-kpi-value" id="total-pending">—</strong>
    </div>

    <div class="payments-kpi-card red">
      <span class="payments-kpi-label">Vencido</span>
      <strong class="payments-kpi-value" id="total-overdue">—</strong>
    </div>

  </div>

  <!-- CAIXA -->
  <div class="payments-cash-card">
    <div class="payments-cash-item">
      <span>Recebido hoje</span>
      <strong id="cash-today">R$ 0,00</strong>
    </div>
    <div class="payments-cash-divider"></div>
    <div class="payments-cash-item">
      <span>Recebido no mês</span>
      <strong id="cash-month">R$ 0,00</strong>
    </div>
  </div>

  <!-- TABELA -->
  <div class="table-container">

    <div class="payments-table-header">
      <h3>Lista de pagamentos</h3>
      <span class="payments-count" id="payments-count"></span>
    </div>

    <table id="payments-table">
      <thead>
        <tr>
          <th>Aluno</th>
          <th>Turma</th>
          <th>Valor</th>
          <th>Competência</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="payments-body">
        <tr><td colspan="6">Carregando...</td></tr>
      </tbody>
    </table>

  </div>

</div>
