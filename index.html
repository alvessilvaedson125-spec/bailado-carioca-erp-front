<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Bailado Carioca — Gestão Escolar</title>
  <link rel="stylesheet" href="/css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
</head>

<body>

<div class="login-page">

  <div class="login-card">

    <div class="login-header">
      <img src="/images/logo.png" alt="Bailado Carioca" class="login-logo">
      <p class="login-subtitle">Gestão Escolar</p>
    </div>

    <div class="login-body">

      <div class="input-group">
        <input type="email" id="email" placeholder="Email">
      </div>

      <div class="input-group">
        <input type="password" id="password" placeholder="Senha">
      </div>

      <button id="loginBtn" class="login-btn">Entrar</button>

      <div id="error-message" class="login-error"></div>

    </div>

  </div>

</div>

<div id="toastContainer" class="toast-container"></div>

<script src="/js/toast.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
