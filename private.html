<div class="page-header">
  <div>
    <h1>Aulas Particulares</h1>
    <p class="page-subtitle">Pacotes, sessões e pagamentos</p>
  </div>
  <div style="display:flex; gap:8px;">
    <button id="newSessionBtn" class="btn-secondary">+ Aula Avulsa</button>
    <button id="newPackageBtn" class="btn-primary">+ Novo Pacote</button>
  </div>
</div>

<!-- STATS -->
<div class="private-kpis">
  <div class="private-kpi-card green">
    <span class="private-kpi-label">Pacotes ativos</span>
    <strong class="private-kpi-value" id="statPackages">0</strong>
  </div>
  <div class="private-kpi-card blue">
    <span class="private-kpi-label">Sessões agendadas</span>
    <strong class="private-kpi-value" id="statSessions">0</strong>
  </div>
  <div class="private-kpi-card green">
    <span class="private-kpi-label">Recebido</span>
    <strong class="private-kpi-value" id="statPaid">R$ 0,00</strong>
  </div>
  <div class="private-kpi-card orange">
    <span class="private-kpi-label">Pendente</span>
    <strong class="private-kpi-value" id="statPending">R$ 0,00</strong>
  </div>
</div>

<!-- ABAS -->
<div class="enrollments-tabs">
  <button class="enrollment-tab active" data-tab="packages">Pacotes</button>
  <button class="enrollment-tab" data-tab="sessions">Sessões</button>
  <button class="enrollment-tab" data-tab="payments">Pagamentos</button>
  <button class="enrollment-tab" data-tab="external">Alunos Externos</button>
</div>

<!-- ABA PACOTES -->
<div id="tabPackages">
  <div id="packagesList">
    <p style="color:#6b7280; text-align:center; padding:40px 0;">Carregando...</p>
  </div>
</div>

<!-- ABA SESSÕES -->
<div id="tabSessions" style="display:none;">
  <div id="sessionsList">
    <p style="color:#6b7280; text-align:center; padding:40px 0;">Carregando...</p>
  </div>
</div>

<!-- ABA PAGAMENTOS -->
<div id="tabPayments" style="display:none;">
  <div id="privatePaymentsList">
    <p style="color:#6b7280; text-align:center; padding:40px 0;">Carregando...</p>
  </div>
</div>

<!-- ABA ALUNOS EXTERNOS -->
<div id="tabExternal" style="display:none;">
  <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
    <button id="newExternalBtn" class="btn-primary">+ Novo Aluno Externo</button>
  </div>
  <div id="externalStudentsList">
    <p style="color:#6b7280; text-align:center; padding:40px 0;">Carregando...</p>
  </div>
</div>

<!-- MODAL ALUNO EXTERNO -->
<div id="externalModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="externalModalTitle">Novo Aluno Externo</h3>
    <input type="hidden" id="editExternalId">
    <div class="form-group">
      <label>Nome</label>
      <input id="editExternalName" type="text" class="form-control" placeholder="Nome completo">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input id="editExternalEmail" type="email" class="form-control" placeholder="email@exemplo.com">
    </div>
    <div class="form-group">
      <label>Telefone</label>
      <input id="editExternalPhone" type="text" class="form-control" placeholder="(21) 99999-9999">
    </div>
    <div class="modal-actions">
      <button id="cancelExternalBtn" class="btn-secondary">Cancelar</button>
      <button id="saveExternalBtn" class="btn-primary">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PACOTE -->
<div id="packageModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="packageModalTitle">Novo Pacote</h3>
    <div class="form-group">
      <label>Aluno</label>
      <select id="pkgStudent" class="form-control"></select>
    </div>
    <div class="form-group">
      <label>Professor 1</label>
      <select id="pkgTeacher1" class="form-control"></select>
    </div>
    <div class="form-group">
      <label>Professor 2 (opcional)</label>
      <select id="pkgTeacher2" class="form-control"></select>
    </div>
    <div class="form-group">
      <label>Número de aulas</label>
      <input id="pkgSessions" type="number" class="form-control" value="4" min="1">
    </div>
    <div class="form-group">
      <label>Valor total (R$)</label>
      <input id="pkgPrice" type="number" class="form-control" placeholder="Ex: 400">
    </div>
    <div class="form-group">
      <label>Local</label>
      <select id="pkgLocation" class="form-control">
        <option value="bailado_laranjeiras">Bailado Laranjeiras</option>
        <option value="student_home">Residência do aluno</option>
      </select>
    </div>
    <div class="form-group" id="pkgLocationNotesGroup" style="display:none;">
      <label>Endereço da residência</label>
      <input id="pkgLocationNotes" type="text" class="form-control" placeholder="Rua, número, bairro...">
    </div>
    <div class="form-group">
      <label>Data de início</label>
      <input id="pkgStartDate" type="date" class="form-control">
    </div>
    <div class="form-group">
      <label>Observações</label>
      <input id="pkgNotes" type="text" class="form-control" placeholder="Opcional">
    </div>
    <div id="pkgPricePreview" class="private-price-preview" style="display:none;"></div>
    <div class="modal-actions">
      <button id="cancelPackageBtn" class="btn-secondary">Cancelar</button>
      <button id="savePackageBtn" class="btn-primary">Salvar pacote</button>
    </div>
  </div>
</div>

<!-- MODAL SESSÃO -->
<div id="sessionModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="sessionModalTitle">Nova Sessão</h3>
    <div class="form-group">
      <label>Aluno</label>
      <select id="sesStudent" class="form-control"></select>
    </div>
    <div class="form-group">
      <label>Vincular ao pacote (opcional)</label>
      <select id="sesPackage" class="form-control">
        <option value="">Aula avulsa</option>
      </select>
    </div>
    <div class="form-group">
      <label>Professor 1</label>
      <select id="sesTeacher1" class="form-control"></select>
    </div>
    <div class="form-group">
      <label>Professor 2 (opcional)</label>
      <select id="sesTeacher2" class="form-control"></select>
    </div>
    <div class="form-group">
      <label>Data e hora</label>
      <input id="sesScheduled" type="datetime-local" class="form-control">
    </div>
    <div class="form-group">
      <label>Duração (minutos)</label>
      <input id="sesDuration" type="number" class="form-control" value="60" min="30">
    </div>
    <div class="form-group" id="sesPriceGroup">
      <label>Valor (R$) — apenas para avulsa</label>
      <input id="sesPrice" type="number" class="form-control" placeholder="Ex: 120">
    </div>
    <div class="form-group">
      <label>Local</label>
      <select id="sesLocation" class="form-control">
        <option value="bailado_laranjeiras">Bailado Laranjeiras</option>
        <option value="student_home">Residência do aluno</option>
      </select>
    </div>
    <div class="form-group" id="sesLocationNotesGroup" style="display:none;">
      <label>Endereço da residência</label>
      <input id="sesLocationNotes" type="text" class="form-control" placeholder="Rua, número, bairro...">
    </div>
    <div class="form-group">
      <label>Observações</label>
      <input id="sesNotes" type="text" class="form-control" placeholder="Opcional">
    </div>
    <div class="modal-actions">
      <button id="cancelSessionBtn" class="btn-secondary">Cancelar</button>
      <button id="saveSessionBtn" class="btn-primary">Salvar sessão</button>
    </div>
  </div>
</div>

<!-- MODAL EDITAR PAGAMENTO -->
<div id="paymentModal" class="modal hidden">
  <div class="modal-content">
    <h3>Editar Pagamento</h3>
    <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:12px 16px; margin-bottom:20px;">
      <strong id="paymentModalStudentName"></strong>
      <span style="color:#6b7280; margin-left:8px;" id="paymentModalType"></span>
    </div>
    <input type="hidden" id="editPaymentId">
    <div class="form-group">
      <label>Valor (R$)</label>
      <input id="editPaymentAmount" type="number" class="form-control" min="0" step="0.01">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="editPaymentStatus" class="form-control">
        <option value="pending">Pendente</option>
        <option value="paid">Pago</option>
      </select>
    </div>
    <div class="form-group">
      <label>Observações</label>
      <input id="editPaymentNotes" type="text" class="form-control" placeholder="Opcional">
    </div>
    <div class="modal-actions">
      <button id="cancelPaymentBtn" class="btn-secondary">Cancelar</button>
      <button id="savePaymentBtn" class="btn-primary">Salvar</button>
    </div>
  </div>
</div>
