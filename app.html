<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bailado Carioca ERP</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="app">

  <header class="header">
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="header-left">Bailado Carioca — Gestão Escolar</div>
    </div>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </header>

  <div class="layout">

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <ul>
        <li data-page="dashboard">Painel</li>
        <li data-page="students">Alunos</li>
        <li data-page="classes">Turmas</li>
        <li data-page="enrollments">Matrículas</li>
        <li data-page="payments">Pagamentos</li>
        <li data-page="cash">Caixa</li>
        <li data-page="teachers">Professores</li>
        <li data-page="units">Unidades</li>
        <li data-page="reports">Relatórios</li>
        <li data-page="attendance">Presença</li>
        <li data-page="admin" class="menu-admin-only">Administração</li>
        <li data-page="private">Aulas Particulares</li>
      </ul>
    </aside>

    <main id="content">
      <h2>Carregando...</h2>
    </main>

  </div>

</div>

<!-- BOTTOM NAV — só mobile -->
<nav class="bottom-nav" id="bottomNav">
  <button class="bottom-nav-item" data-page="dashboard">
    <span class="bottom-nav-icon">📊</span>
    <span class="bottom-nav-label">Painel</span>
  </button>
  <button class="bottom-nav-item" data-page="students">
    <span class="bottom-nav-icon">👥</span>
    <span class="bottom-nav-label">Alunos</span>
  </button>
  <button class="bottom-nav-item" data-page="payments">
    <span class="bottom-nav-icon">💳</span>
    <span class="bottom-nav-label">Pagamentos</span>
  </button>
  <button class="bottom-nav-item" data-page="enrollments">
    <span class="bottom-nav-icon">🎓</span>
    <span class="bottom-nav-label">Matrículas</span>
  </button>
  <button class="bottom-nav-item" id="bottomMoreBtn">
    <span class="bottom-nav-icon">☰</span>
    <span class="bottom-nav-label">Mais</span>
  </button>
</nav>

<!-- DRAWER "MAIS" — só mobile -->
<div class="bottom-drawer-overlay" id="bottomDrawerOverlay"></div>
<div class="bottom-drawer" id="bottomDrawer">
  <div class="bottom-drawer-handle"></div>
  <div class="bottom-drawer-grid">
    <button class="bottom-drawer-item" data-page="classes">
      <span>🏫</span>
      <span>Turmas</span>
    </button>
    <button class="bottom-drawer-item" data-page="attendance">
      <span>✅</span>
      <span>Presença</span>
    </button>
    <button class="bottom-drawer-item" data-page="cash">
      <span>💰</span>
      <span>Caixa</span>
    </button>
    <button class="bottom-drawer-item" data-page="reports">
      <span>📈</span>
      <span>Relatórios</span>
    </button>
    <button class="bottom-drawer-item" data-page="private">
      <span>🎵</span>
      <span>Particulares</span>
    </button>
    <button class="bottom-drawer-item" data-page="teachers">
      <span>👨‍🏫</span>
      <span>Professores</span>
    </button>
    <button class="bottom-drawer-item" data-page="units">
      <span>📍</span>
      <span>Unidades</span>
    </button>
    <button class="bottom-drawer-item menu-admin-only" data-page="admin">
      <span>⚙️</span>
      <span>Admin</span>
    </button>
  </div>
</div>

<!-- CORE / GLOBAL -->
<script src="/js/toast.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>

<!-- SISTEMA -->
<script src="/js/router.js"></script>

<!-- MÓDULOS -->
<script src="/js/students.js"></script>
<script src="/js/classes.js"></script>
<script src="/js/units.js"></script>
<script src="/js/teachers.js"></script>
<script src="/js/enrollments.js"></script>
<script src="/js/payments.js"></script>
<script src="/js/cash.js"></script>
<script src="/js/finance.js"></script>
<script src="js/reports.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/private.js"></script>
<script src="/js/attendance.js"></script>

<!-- EXTERNOS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- DASHBOARD -->
<script src="/js/dashboard.js"></script>

<script>
(function () {
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.replace("/index.html");
    return;
  }

  // Controle de menu por role
  const role = localStorage.getItem("user_role");
  if (role !== "admin") {
    document.querySelectorAll(".menu-admin-only").forEach(el => {
      el.style.display = "none";
    });
  }

  // ===============================
  // SIDEBAR — desktop/tablet
  // ===============================
  const toggle  = document.getElementById("menuToggle");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");

  function openMenu(){
    sidebar.classList.add("open");
    overlay.classList.add("active");
  }

  function closeMenu(){
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
  }

  if(toggle)  toggle.onclick  = () => sidebar.classList.contains("open") ? closeMenu() : openMenu();
  if(overlay) overlay.onclick = closeMenu;

  document.querySelectorAll(".sidebar li").forEach(li => {
    li.addEventListener("click", () => {
      if(window.innerWidth <= 768) closeMenu();
    });
  });

  // ===============================
  // BOTTOM NAV — mobile
  // ===============================
  const drawer        = document.getElementById("bottomDrawer");
  const drawerOverlay = document.getElementById("bottomDrawerOverlay");
  const moreBtn       = document.getElementById("bottomMoreBtn");

  function openDrawer(){
    drawer?.classList.add("open");
    drawerOverlay?.classList.add("active");
  }

  function closeDrawer(){
    drawer?.classList.remove("open");
    drawerOverlay?.classList.remove("active");
  }

  function setBottomActive(page){
    document.querySelectorAll(".bottom-nav-item").forEach(b => b.classList.remove("active"));
    const target = document.querySelector(`.bottom-nav-item[data-page="${page}"]`);
    if(target){
      target.classList.add("active");
    } else {
      // página está no drawer — destaca o botão Mais
      moreBtn?.classList.add("active");
    }
  }

  // Itens da bottom bar
  document.querySelectorAll(".bottom-nav-item[data-page]").forEach(btn => {
    btn.addEventListener("click", () => {
      const page = btn.dataset.page;
      window.location.hash = page;
      setBottomActive(page);
      closeDrawer();
    });
  });

  // Botão Mais
  if(moreBtn){
    moreBtn.addEventListener("click", () => {
      drawer?.classList.contains("open") ? closeDrawer() : openDrawer();
    });
  }

  // Itens do drawer
  document.querySelectorAll(".bottom-drawer-item[data-page]").forEach(btn => {
    btn.addEventListener("click", () => {
      const page = btn.dataset.page;
      window.location.hash = page;
      setBottomActive(page);
      closeDrawer();
    });
  });

  // Fecha drawer ao clicar no overlay
  drawerOverlay?.addEventListener("click", closeDrawer);

  // Sincroniza com hash
  window.addEventListener("hashchange", () => {
    const page = window.location.hash.replace("#", "") || "dashboard";
    setBottomActive(page);
    closeDrawer();
  });

  // Estado inicial
  const currentPage = window.location.hash.replace("#", "") || "dashboard";
  setBottomActive(currentPage);

})();
</script>

</body>
</html>
