<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bailado Carioca ERP</title>
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="app">

  <header class="header">
    <div style="display:flex; align-items:center; gap:12px;">
      <button class="menu-toggle" id="menuToggle">☰</button>
      <div class="header-left">Bailado Carioca — Gestão Escolar</div>
    </div>
    <div class="header-right">
      <span id="user-name"></span>
      <button id="logout-btn">Logout</button>
    </div>
  </header>

  <div class="layout">

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <ul>
        <li data-page="dashboard">Painel</li>
        <li data-page="students">Alunos</li>
        <li data-page="classes">Turmas</li>
        <li data-page="enrollments">Matrículas</li>
        <li data-page="payments">Pagamentos</li>
        <li data-page="cash">Caixa</li>
        <li data-page="teachers">Professores</li>
        <li data-page="units">Unidades</li>
        <li data-page="reports">Relatórios</li>
        <li data-page="attendance">Presença</li>
        <li data-page="admin" class="menu-admin-only">Administração</li>
      </ul>
    </aside>

    <main id="content">
      <h2>Carregando...</h2>
    </main>

  </div>

</div>

<!-- CORE / GLOBAL -->
<script src="/js/toast.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>

<!-- SISTEMA -->
<script src="/js/router.js"></script>

<!-- MÓDULOS -->
<script src="/js/students.js"></script>
<script src="/js/classes.js"></script>
<script src="/js/units.js"></script>
<script src="/js/teachers.js"></script>
<script src="/js/enrollments.js"></script>
<script src="/js/payments.js"></script>
<script src="/js/cash.js"></script>
<script src="/js/finance.js"></script>
<script src="js/reports.js"></script>
<script src="/js/admin.js"></script>
<script src="/js/attendance.js"></script>

<!-- EXTERNOS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- DASHBOARD -->
<script src="/js/dashboard.js"></script>

<script>
(function () {
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.replace("/index.html");
    return;
  }

  // Controle de menu por role
  const role = localStorage.getItem("user_role");
  if (role !== "admin") {
    document.querySelectorAll(".menu-admin-only").forEach(el => {
      el.style.display = "none";
    });
  }

  // 🔥 Hamburguer
  const toggle  = document.getElementById("menuToggle");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");

  function openMenu(){
    sidebar.classList.add("open");
    overlay.classList.add("active");
  }

  function closeMenu(){
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
  }

  if(toggle)  toggle.onclick  = () => sidebar.classList.contains("open") ? closeMenu() : openMenu();
  if(overlay) overlay.onclick = closeMenu;

  // Fecha menu ao navegar no mobile
  document.querySelectorAll(".sidebar li").forEach(li => {
    li.addEventListener("click", () => {
      if(window.innerWidth <= 768) closeMenu();
    });
  });

})();
</script>

</body>
</html>
