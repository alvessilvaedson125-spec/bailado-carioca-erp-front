<div class="page">

  <div class="page-header">
    <div>
      <h1>Unidades</h1>
      <p class="page-subtitle">Gerencie as unidades da escola</p>
    </div>
    <button id="newUnitBtn" class="btn-primary">+ Nova Unidade</button>
  </div>

  <div class="search-bar">
    <input
      type="text"
      id="searchUnit"
      placeholder="🔍 Buscar unidade..."
    />
  </div>

  <div class="table-container">
    <table class="data-table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Criado em</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="unitsTable">
        <tr>
          <td colspan="3">Carregando...</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<!-- MODAL -->
<div id="unitModal" class="modal hidden">
  <div class="modal-content">

    <h2 id="unitModalTitle">Nova Unidade</h2>

    <input type="hidden" id="editUnitId" />

    <div class="form-group">
      <label>Nome da unidade</label>
      <input
        type="text"
        id="editUnitName"
        placeholder="Ex: Copacabana"
      />
    </div>

    <div class="modal-actions">
      <button id="cancelUnitBtn" class="btn-secondary">Cancelar</button>
      <button id="saveUnitBtn" class="btn-primary">Salvar</button>
    </div>

  </div>
</div>
