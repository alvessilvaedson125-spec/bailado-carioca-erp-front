<div class="page-header">
  <div>
    <h1>Turmas</h1>
    <p class="page-subtitle">Gerencie as turmas da escola</p>
  </div>
  <div class="page-actions">
    <input
      type="text"
      id="searchClasses"
      placeholder="Buscar turma..."
      class="search-input"
    />
    <button id="newClassBtn" class="btn-primary">+ Nova Turma</button>
  </div>
</div>

<!-- CONTADOR -->
<div class="classes-stats">
  <span id="classesCount" class="students-count">Carregando...</span>
</div>

<div class="table-container">
  <table id="classesTable">
    <thead>
      <tr>
        <th>Nome</th>
        <th>Professor</th>
        <th>Unidade</th>
        <th>Dia</th>
        <th>Horário</th>
        <th>Alunos</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td colspan="7">Carregando...</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Modal turma -->
<div id="classModal" class="modal">
  <div class="modal-content">

    <h3 id="classModalTitle">Nova Turma</h3>

    <input type="hidden" id="editClassId">

    <div class="form-group">
      <label>Nome da turma</label>
      <input type="text" id="editClassName" placeholder="Ex: Forró iniciante">
    </div>

    <div class="form-group">
      <label>Professores</label>
      <div id="teachersContainer"></div>
      <button type="button" id="addTeacherBtn" class="btn-secondary" style="margin-top:8px;">
        + Adicionar professor
      </button>
    </div>

    <div class="form-group">
      <label>Unidade</label>
      <select id="editClassUnit">
        <option value="">Selecione a unidade</option>
      </select>
    </div>

    <div class="form-group">
      <label>Dia da semana</label>
      <select id="editClassDay">
        <option value="">Selecione</option>
        <option>Segunda</option>
        <option>Terça</option>
        <option>Quarta</option>
        <option>Quinta</option>
        <option>Sexta</option>
        <option>Sábado</option>
        <option>Domingo</option>
      </select>
    </div>

    <div class="form-group">
      <label>Horário</label>
      <input type="time" id="editClassTime">
    </div>

    <div class="modal-actions">
      <button id="cancelClassBtn" class="btn-secondary">Cancelar</button>
      <button id="saveClassBtn" class="btn-primary">Salvar</button>
    </div>

  </div>
</div>
