<div class="page-header">

<h2>Turmas</h2>

<div class="page-actions">

<input
type="text"
id="searchClasses"
placeholder="Buscar turma..."
class="search-input"
/>

<button id="newClassBtn" class="btn-primary">
Nova Turma
</button>

</div>

</div>


<div class="table-container">

<table id="classesTable">

<thead>
<tr>
<th>Nome</th>
<th>Professor</th>
<th>Unidade</th>
<th>Dia</th>
<th>Horário</th>
<th>Condutores</th>
<th>Conduzidas</th>
<th>Ações</th>
</tr>
</thead>
<tbody>

<tr>
<td colspan="7">Carregando...</td>
</tr>

</tbody>

</table>

</div>


<!-- Modal turma -->

<div id="classModal" class="modal hidden">

<div class="modal-content">

<h3>Nova Turma</h3>

<input type="hidden" id="editClassId">

<div class="form-group">
<label>Nome da turma</label>
<input type="text" id="editClassName">
</div>

<div class="form-group">
<label>Professor</label>
<select id="editClassTeacher">
<option value="">Selecione o professor</option>
</select>
</div>

<div class="form-group">
<label>Unidade</label>
<select id="editClassUnit">
<option value="">Selecione a unidade</option>
</select>
</div>

<div class="form-group">
<label>Dia da semana</label>
<select id="editClassDay">

<option value="">Selecione</option>
<option>Segunda</option>
<option>Terça</option>
<option>Quarta</option>
<option>Quinta</option>
<option>Sexta</option>
<option>Sábado</option>
<option>Domingo</option>

</select>
</div>

<div class="form-group">
<label>Horário</label>
<input type="time" id="editClassTime">
</div>

<div class="form-group">
<label>Capacidade condutores</label>
<input type="number" id="editClassCapacityLeaders" min="0" placeholder="Ex: 12">
</div>

<div class="form-group">
<label>Capacidade conduzidas</label>
<input type="number" id="editClassCapacityFollowers" min="0" placeholder="Ex: 12">
</div>
<div class="modal-actions">

<button id="cancelClassBtn">
Cancelar
</button>

<button id="saveClassBtn" class="btn-primary">
Salvar
</button>

</div>

</div>

</div>
