<h2>Professores</h2>

<div class="page-header teachers-header"></div>

  <div class="teachers-actions"></div>

    <input
      type="text"
      id="teacherSearch"
      placeholder="Buscar professor..."
    >

    <button
      class="btn-secondary"
      onclick="TeachersModule.clearSearch()"
    >
      Limpar
    </button>

  </div>

  <button
    class="btn-primary"
   onclick="TeachersModule.newTeacher()"
  >
    Novo Professor
  </button>

</div>

<table class="table">

<thead>
<tr>

<th>Nome</th>
<th>Email</th>
<th>Telefone</th>
<th>Status</th>
<th>Ações</th>

</tr>
</thead>

<tbody id="teachersTable">

<tr>
<td colspan="5">Nenhum professor encontrado</td>
</tr>

</tbody>

</table>


<div id="teacherModal" class="modal hidden">

<div class="modal-content">

<h3>Novo Professor</h3>

<input type="hidden" id="editTeacherId">


<div class="form-group">
<label>Nome</label>
<input type="text" id="editTeacherName">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="editTeacherEmail">
</div>

<div class="form-group">
<label>Telefone</label>
<input type="text" id="editTeacherPhone">
</div>

<div class="form-group">
<label>Status</label>

<select id="editTeacherStatus">

<option value="active">Ativo</option>
<option value="inactive">Inativo</option>

</select>

</div>


<div class="modal-actions">

<button onclick="TeachersModule.closeTeacherModal()"></button>
Cancelar
</button>

<button
class="btn-primary"
onclick="TeachersModule.saveTeacher()"
>
Salvar
</button>

</div>

</div>

</div>
