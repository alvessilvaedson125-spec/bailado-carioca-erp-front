<div class="dashboard">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h2>Dashboard</h2>
      <p>Visão geral do sistema</p>
    </div>
  </div>

  <!-- KPIs -->
  <div class="metrics">

    <div class="metric-card">
      <div class="metric-title">Alunos</div>
      <div class="metric-value" id="metric-students">0</div>
      <div class="metric-sub">Total cadastrados</div>
    </div>

    <div class="metric-card">
      <div class="metric-title">Turmas</div>
      <div class="metric-value" id="metric-classes">0</div>
      <div class="metric-sub">Ativas no sistema</div>
    </div>

    <div class="metric-card">
      <div class="metric-title">Matrículas</div>
      <div class="metric-value" id="metric-enrollments">0</div>
      <div class="metric-sub">Vínculos ativos</div>
    </div>

    <div class="metric-card">
      <div class="metric-title">Pagamentos</div>
      <div class="metric-value" id="metric-payments">0</div>
      <div class="metric-sub">Registros financeiros</div>
    </div>

  </div>

  <!-- DRE -->
  <div class="card dre-card">

    <div class="card-header">
      <h3>DRE (Resultado Financeiro)</h3>
    </div>

    <div class="dre-grid">

      <div class="dre-item receita">
        <span>Receitas</span>
        <strong id="dre-receita">R$ 0,00</strong>
      </div>

      <div class="dre-item despesa">
        <span>Despesas</span>
        <strong id="dre-despesa">R$ 0,00</strong>
      </div>

      <div class="dre-item resultado">
        <span>Resultado</span>
        <strong id="dre-resultado">R$ 0,00</strong>
      </div>

    </div>

  </div>

  <!-- GRÁFICO -->
  <div class="card">

    <div class="card-header">
      <h3>Evolução Financeira</h3>
    </div>

    <div class="chart-container">
      <canvas id="financeChart"></canvas>
    </div>

  </div>

  <!-- AÇÕES -->
  <div class="card">

    <div class="card-header">
      <h3>Ações rápidas</h3>
    </div>

    <div class="actions">
      <button onclick="loadStudents()">Listar alunos</button>
      <button onclick="logout()">Sair do sistema</button>
    </div>

  </div>

</div>
