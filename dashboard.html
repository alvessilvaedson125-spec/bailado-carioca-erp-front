<div class="dashboard">

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h2>Dashboard</h2>
      <p>Visão financeira e operacional</p>
    </div>
  </div>

  <!-- KPIs -->
  <div class="metrics">

    <div class="metric-card">
      <div class="metric-title">Alunos</div>
      <div class="metric-value" id="metric-students">0</div>
      <div class="metric-sub">Total cadastrados</div>
    </div>

    <div class="metric-card">
      <div class="metric-title">Turmas</div>
      <div class="metric-value" id="metric-classes">0</div>
      <div class="metric-sub">Ativas</div>
    </div>

    <div class="metric-card">
      <div class="metric-title">Matrículas</div>
      <div class="metric-value" id="metric-enrollments">0</div>
      <div class="metric-sub">Vínculos ativos</div>
    </div>

    <div class="metric-card">
      <div class="metric-title">Pagamentos</div>
      <div class="metric-value" id="metric-payments">0</div>
      <div class="metric-sub">Registros</div>
    </div>

  </div>

  <!-- ============================= -->
  <!-- FINANCEIRO -->
  <!-- ============================= -->

  <div class="finance-section">

    <!-- GRID DE CARDS -->
    <div class="finance-grid">

      <!-- RECEITA -->
      <div class="finance-card receita">
        <h3>Receita</h3>
        <p>Esperado: <strong id="dre-recebido"></strong></p>
        <p>Recebido: <strong id="dre-projetado"></strong></p>
        <p>Projetado: <strong id="dre-atrasado"></strong></p>
      </div>

      <!-- INADIMPLÊNCIA -->
      <div class="finance-card inadimplencia">
        <h3>Inadimplência</h3>
        <p>Atrasado: <strong id="dre-inadimplencia"></strong></p>
        <p>Taxa: <strong id="dre-inadimplencia-percent"></strong></p>
      </div>

      <!-- CAIXA -->
      <div class="finance-card caixa">
        <h3>Caixa</h3>
        <p>Entradas: <strong id="dre-entradas"></strong></p>
        <p>Saídas: <strong id="dre-saidas"></strong></p>
        <p>Saldo: <strong id="dre-saldo"></strong></p>
      </div>

    </div>

    <!-- ============================= -->
    <!-- GRÁFICO + RESUMO -->
    <!-- ============================= -->

    <div class="finance-bottom">

      <!-- GRÁFICO -->
      <div class="finance-chart">
        <canvas id="financeChart"></canvas>
      </div>

      <!-- RESUMO LATERAL -->
      <div class="finance-summary">
        <h4>Resumo</h4>
        <p>Recebido: <strong id="dre-recebido"></strong></p>
        <p>Projetado: <strong id="dre-projetado"></strong></p>
        <p>Inadimplência: <strong id="dre-inadimplencia"></strong></p>
      </div>

    </div>

  </div>

</div>
